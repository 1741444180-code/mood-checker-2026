name: Help Center CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint Markdown files
        run: npx markdownlint-cli docs/**/*.md
        
      - name: Check links
        run: npm run docusaurus links
        
      - name: Type check
        run: npm run typecheck

  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build documentation
        run: npm run build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 7

  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/
          
      - name: Setup Vercel CLI
        run: npm install -g vercel@latest
        
      - name: Deploy to Vercel Preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_HELP_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          vercel --token=$VERCEL_TOKEN \
                 --project=$VERCEL_PROJECT_ID \
                 --org=$VERCEL_ORG_ID \
                 --builds=false \
                 --deployer=openclaw-ci \
                 --environment=preview \
                 --yes

  production-deployment:
    name: Production Deployment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/
          
      - name: Setup Vercel CLI
        run: npm install -g vercel@latest
        
      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_HELP_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          vercel --token=$VERCEL_TOKEN \
                 --project=$VERCEL_PROJECT_ID \
                 --org=$VERCEL_ORG_ID \
                 --builds=false \
                 --deployer=openclaw-ci \
                 --prod \
                 --yes
                 
      - name: Purge CDN Cache (if using Cloudflare)
        if: success() && env.CF_ZONE_ID != ''
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
               -H "Authorization: Bearer $CF_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data '{"purge_everything":true}'

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: [test-deployment, production-deployment]
    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [[ "${{ needs.test-deployment.result }}" == "success" ]] || [[ "${{ needs.production-deployment.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ 帮助中心部署成功！" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ 帮助中心部署失败！" >> $GITHUB_OUTPUT
          fi
          
      - name: Send notification to Feishu
        if: github.event_name == 'push'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_DEPLOYMENT_WEBHOOK }}
        run: |
          curl -X POST "$FEISHU_WEBHOOK_URL" \
               -H "Content-Type: application/json" \
               -d '{
                 "msg_type": "interactive",
                 "card": {
                   "config": {
                     "wide_screen_mode": true
                   },
                   "header": {
                     "template": "'$( [[ "${{ steps.status.outputs.status }}" == "success" ]] && echo "green" || echo "red" )'",
                     "text": {
                       "content": "${{ steps.status.outputs.message }}",
                       "tag": "plain_text"
                     }
                   },
                   "elements": [
                     {
                       "tag": "div",
                       "text": {
                         "content": "分支: `${{ github.ref_name }}`\n提交: `${{ github.sha }}`\n作者: `${{ github.actor }}`",
                         "tag": "lark_md"
                       }
                     },
                     {
                       "tag": "action",
                       "actions": [
                         {
                           "tag": "button",
                           "text": {
                             "content": "查看部署",
                             "tag": "plain_text"
                           },
                           "url": "https://github.com/moodtracker/help-center/actions/runs/${{ github.run_id }}",
                           "type": "default"
                         }
                       ]
                     }
                   ]
                 }
               }'