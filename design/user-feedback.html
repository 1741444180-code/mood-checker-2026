<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户反馈 - 小雅设计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .form-container {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 15px;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-group .hint {
            margin-top: 8px;
            font-size: 13px;
            color: #999;
        }

        .rating-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .rating-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .rating-option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .rating-option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 14px;
            }

            .form-container {
                padding: 30px 20px;
            }

            .form-group {
                margin-bottom: 25px;
            }

            .rating-group {
                flex-wrap: wrap;
            }

            .rating-option {
                flex: 0 0 calc(50% - 5px);
            }
        }

        @media (max-width: 480px) {
            .rating-option {
                flex: 0 0 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 用户反馈</h1>
            <p>您的意见对我们非常重要，帮助我们做得更好</p>
        </div>

        <div class="form-container">
            <form id="feedbackForm">
                <div class="form-group">
                    <label>反馈类型 <span class="required">*</span></label>
                    <select required>
                        <option value="">请选择反馈类型</option>
                        <option value="bug">🐛 问题报告</option>
                        <option value="feature">💡 功能建议</option>
                        <option value="design">🎨 设计优化</option>
                        <option value="performance">⚡ 性能问题</option>
                        <option value="other">📝 其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>标题 <span class="required">*</span></label>
                    <input type="text" placeholder="用一句话概括您的反馈" required>
                </div>

                <div class="form-group">
                    <label>详细描述 <span class="required">*</span></label>
                    <textarea placeholder="请详细描述您遇到的问题或建议，包括具体的使用场景..." required></textarea>
                    <div class="hint">请尽可能提供详细信息，帮助我们更好地理解您的需求</div>
                </div>

                <div class="form-group">
                    <label>满意度评分</label>
                    <div class="rating-group">
                        <div class="rating-option" data-rating="1">😞 非常不满意</div>
                        <div class="rating-option" data-rating="2">😐 不满意</div>
                        <div class="rating-option" data-rating="3">😐 一般</div>
                        <div class="rating-option" data-rating="4">🙂 满意</div>
                        <div class="rating-option" data-rating="5">😍 非常满意</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>联系方式（选填）</label>
                    <input type="email" placeholder="您的邮箱，方便我们回复您">
                    <div class="hint">如果需要我们回复，请留下您的联系方式</div>
                </div>

                <button type="submit" class="submit-btn">
                    🚀 提交反馈
                </button>
            </form>
        </div>
    </div>

    <script>
        // 评分选择交互
        document.querySelectorAll('.rating-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.rating-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // 表单提交
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ 反馈提交成功！感谢您的宝贵意见！');
        });
    </script>
</body>
</html>
