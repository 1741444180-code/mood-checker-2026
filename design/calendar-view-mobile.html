<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历视图 - 小雅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .current-month {
            font-size: 18px;
            font-weight: 600;
        }

        .content {
            padding: 16px;
        }

        /* View Tabs */
        .view-tabs {
            display: flex;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .view-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Calendar Grid */
        .calendar {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .weekday {
            padding: 12px 4px;
            text-align: center;
            font-weight: 600;
            color: #666;
            font-size: 12px;
        }

        .weekday:first-child {
            color: #e74c3c;
        }

        .weekday:last-child {
            color: #3498db;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .day {
            min-height: 60px;
            padding: 6px 4px;
            border-right: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            background: white;
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .day:active {
            background: #f0f1f2;
        }

        .day:nth-child(7n) {
            border-right: none;
        }

        .day.other-month {
            background: #fafbfc;
            color: #ccc;
        }

        .day.today {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }

        .day-number {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a2e;
            display: inline-block;
            width: 26px;
            height: 26px;
            line-height: 26px;
            text-align: center;
            border-radius: 50%;
            margin-bottom: 4px;
        }

        .day.today .day-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .day.other-month .day-number {
            color: #ccc;
        }

        /* Event Dots */
        .event-dots {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 2px;
        }

        .event-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .event-dot.work {
            background: #667eea;
        }

        .event-dot.personal {
            background: #3498db;
        }

        .event-dot.meeting {
            background: #e74c3c;
        }

        /* Upcoming Events */
        .sidebar {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-all {
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
        }

        .upcoming-event {
            background: white;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upcoming-event:active {
            transform: scale(0.98);
        }

        .event-time {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .event-title {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .event-location {
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .add-event-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .add-event-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: #667eea;
        }

        .nav-icon {
            font-size: 20px;
        }

        /* Safe Area */
        .safe-area {
            height: env(safe-area-inset-bottom, 20px);
        }

        /* Legend */
        .legend {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .legend-title {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
        }

        .legend-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>📅 日历</h1>
                <div class="header-actions">
                    <button class="icon-btn">🔍</button>
                    <button class="icon-btn">+</button>
                </div>
            </div>
            <div class="nav-controls">
                <button class="nav-btn">‹</button>
                <div class="current-month">2026 年 3 月</div>
                <button class="nav-btn">›</button>
            </div>
        </div>

        <div class="content">

            <div class="view-tabs">
                <div class="view-tab">日</div>
                <div class="view-tab">周</div>
                <div class="view-tab active">月</div>

            </div>

            <!-- Calendar Grid -->
            <div class="calendar">
                <div class="weekdays">
                    <div class="weekday">日</div>

                    <div class="weekday">二</div>

                    <div class="weekday">四</div>
                    <div class="weekday">五</div>

                <div class="days">

                    <div class="day other-month"><span class="day-number">23</span></div>
                    <div class="day other-month"><span class="day-number">24</span></div>
                    <div class="day other-month"><span class="day-number">25</span></div>
                    <div class="day other-month"><span class="day-number">26</span></div>
                    <div class="day other-month"><span class="day-number">27</span></div>
                    <div class="day other-month"><span class="day-number">28</span></div>
                    <div class="day other-month"><span class="day-number">1</span></div>
                    
                    <!-- 本月 -->
                    <div class="day"><span class="day-number">2</span></div>
                    <div class="day"><span class="day-number">3</span></div>
                    <div class="day"><span class="day-number">4</span></div>
                    <div class="day"><span class="day-number">5</span></div>
                    <div class="day"><span class="day-number">6</span></div>
                    <div class="day"><span class="day-number">7</span></div>
                    <div class="day"><span class="day-number">8</span></div>
                    
                    <div class="day"><span class="day-number">9</span></div>
                    <div class="day"><span class="day-number">10</span></div>
                    <div class="day"><span class="day-number">11</span></div>
                    <div class="day"><span class="day-number">12</span></div>
                    <div class="day"><span class="day-number">13</span></div>
                    <div class="day"><span class="day-number">14</span></div>
                    <div class="day"><span class="day-number">15</span></div>
                    
                    <div class="day"><span class="day-number">16</span></div>
                    <div class="day"><span class="day-number">17</span></div>
                    <div class="day"><span class="day-number">18</span></div>
                    <div class="day"><span class="day-number">19</span></div>
                    <div class="day"><span class="day-number">20</span></div>
                    <div class="day"><span class="day-number">21</span></div>
                    <div class="day"><span class="day-number">22</span></div>
                    
                    <div class="day"><span class="day-number">23</span></div>
                    <div class="day"><span class="day-number">24</span></div>
                    <div class="day"><span class="day-number">25</span></div>
                    <div class="day"><span class="day-number">26</span></div>
                    <div class="day"><span class="day-number">27</span></div>
                    <div class="day today"><span class="day-number">28</span>
                        <div class="event-dots">
                            <div class="event-dot work"></div>
                            <div class="event-dot meeting"></div>
                        </div>
                    </div>
                    <div class="day"><span class="day-number">29</span></div>
                    
                    <div class="day"><span class="day-number">30</span></div>
                    <div class="day"><span class="day-number">31</span></div>
                    <div class="day"><span class="day-number">1</span></div>
                    <div class="day"><span class="day-number">2</span></div>
                    <div class="day"><span class="day-number">3</span></div>
                    <div class="day"><span class="day-number">4</span></div>
                    <div class="day"><span class="day-number">5</span></div>
                </div>
            </div>

            <!-- Upcoming Events -->
            <div class="sidebar">
                <div class="sidebar-title">
                    📌 即将开始
                    <span class="view-all">查看全部</span>
                </div>
                
                <div class="upcoming-event">
                    <div class="event-time">🕐 今天 10:00 - 10:30</div>
                    <div class="event-title">团队站会</div>
                    <div class="event-location">📍 会议室 A</div>
                </div>

                <div class="upcoming-event">
                    <div class="event-time">🕐 今天 14:00 - 15:30</div>
                    <div class="event-title">产品评审会</div>
                    <div class="event-location">📍 会议室 B</div>
                </div>

                <div class="upcoming-event">

                <button class="add-event-btn">+ 添加日程</button>

                <div class="legend">
                    <div class="legend-title">图例</div>
                    <div class="legend-items">
                        <div class="legend-item">
                            <div class="legend-color" style="background: #667eea;"></div>
                            <span>工作</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #3498db;"></div>
                            <span>个人</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #f1c40f;"></div>
                            <span>提醒</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #e74c3c;"></div>
                            <span>会议</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item active">
                <span class="nav-icon">📅</span>
                <span>日历</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🔔</span>
                <span>提醒</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>设置</span>
            </div>
        </div>

        <div class="safe-area"></div>
    </div>
</body>
</html>
