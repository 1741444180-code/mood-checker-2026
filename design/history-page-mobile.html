<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡历史 - 心情打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'mood-happy': '#FFD700',
                        'mood-calm': '#90EE90',
                        'mood-sad': '#87CEEB',
                        'mood-angry': '#FF6B6B',
                        'mood-anxious': '#DDA0DD',
                        'mood-tired': '#D3D3D3',
                        'mood-excited': '#FF69B4',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
            <button class="text-gray-600 hover:text-gray-900">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="text-lg font-semibold text-gray-900">打卡历史</h1>
            <button class="text-gray-600 hover:text-gray-900">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 日期筛选器 -->
    <div class="max-w-md mx-auto px-4 py-3">
        <div class="flex items-center justify-between bg-white rounded-lg px-4 py-2 shadow-sm">
            <button class="text-blue-500 font-medium">2026 年 3 月</button>
            <div class="flex items-center space-x-2">
                <button class="p-2 hover:bg-gray-100 rounded-full">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <button class="p-2 hover:bg-gray-100 rounded-full">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 打卡历史列表 -->
    <div class="max-w-md mx-auto px-4 pb-20">
        <!-- 3 月 28 日 -->
        <div class="mb-4">
            <h3 class="text-sm font-medium text-gray-500 mb-2">今天</h3>
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-100">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 rounded-full bg-mood-happy flex items-center justify-center text-2xl">
                                😄
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">开心</p>
                                <p class="text-sm text-gray-500">14:30</p>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400">3 小时前</span>
                    </div>
                    <p class="mt-3 text-gray-600 text-sm">今天工作顺利，完成了重要项目！</p>
                    <div class="mt-2 flex flex-wrap gap-1">
                        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-full">#工作</span>
                        <span class="px-2 py-1 bg-green-50 text-green-600 text-xs rounded-full">#成就</span>
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 rounded-full bg-mood-calm flex items-center justify-center text-2xl">
                                😊
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">平静</p>
                                <p class="text-sm text-gray-500">09:15</p>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400">8 小时前</span>
                    </div>
                    <p class="mt-3 text-gray-600 text-sm">早晨喝咖啡，享受宁静时光</p>
                    <div class="mt-2 flex flex-wrap gap-1">
                        <span class="px-2 py-1 bg-purple-50 text-purple-600 text-xs rounded-full">#生活</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3 月 27 日 -->
        <div class="mb-4">
            <h3 class="text-sm font-medium text-gray-500 mb-2">昨天</h3>
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-100">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 rounded-full bg-mood-tired flex items-center justify-center text-2xl">
                                😴
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">疲惫</p>
                                <p class="text-sm text-gray-500">22:45</p>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400">昨天</span>
                    </div>
                    <p class="mt-3 text-gray-600 text-sm">加班到很晚，需要休息</p>
                    <div class="mt-2 flex flex-wrap gap-1">
                        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-full">#工作</span>
                        <span class="px-2 py-1 bg-red-50 text-red-600 text-xs rounded-full">#健康</span>
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 rounded-full bg-mood-angry flex items-center justify-center text-2xl">
                                😠
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">生气</p>
                                <p class="text-sm text-gray-500">15:20</p>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400">昨天</span>
                    </div>
                    <p class="mt-3 text-gray-600 text-sm">遇到不合理的客户需求</p>
                    <div class="mt-2 flex flex-wrap gap-1">
                        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-full">#工作</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3 月 26 日 -->
        <div class="mb-4">
            <h3 class="text-sm font-medium text-gray-500 mb-2">3 月 26 日</h3>
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="p-4">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 rounded-full bg-mood-excited flex items-center justify-center text-2xl">
                                🤩
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">兴奋</p>
                                <p class="text-sm text-gray-500">18:00</p>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400">2 天前</span>
                    </div>
                    <p class="mt-3 text-gray-600 text-sm">收到好消息，项目获批！</p>
                    <div class="mt-2 flex flex-wrap gap-1">
                        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-full">#工作</span>
                        <span class="px-2 py-1 bg-green-50 text-green-600 text-xs rounded-full">#成就</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
        <div class="max-w-md mx-auto px-4 py-2 flex justify-around">
            <a href="#" class="flex flex-col items-center py-2 text-gray-400 hover:text-blue-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="text-xs mt-1">首页</span>
            </a>
            <a href="#" class="flex flex-col items-center py-2 text-blue-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <span class="text-xs mt-1">历史</span>
            </a>
            <a href="#" class="flex flex-col items-center py-2 text-gray-400 hover:text-blue-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span class="text-xs mt-1">统计</span>
            </a>
            <a href="#" class="flex flex-col items-center py-2 text-gray-400 hover:text-blue-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>
</body>
</html>
