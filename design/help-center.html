<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮助中心 - 心情打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }
        
        .header h1 {
            font-size: 48px;
            margin-bottom: 16px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-box {
            max-width: 600px;
            margin: 40px auto;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 20px 30px;
            padding-left: 60px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            outline: none;
        }
        
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }
        
        .category-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        
        .category-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .category-card h3 {
            font-size: 22px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .category-card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .quick-links {
            margin-top: 80px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .quick-links h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .link-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: background 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }
        
        .link-item:hover {
            background: #e9ecef;
        }
        
        .link-item span {
            font-size: 24px;
            margin-right: 15px;
        }
        
        .link-item strong {
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }
            
            .header p {
                font-size: 16px;
            }
            
            .categories {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>帮助中心</h1>
            <p>找到你需要的答案，让心情打卡更简单</p>
        </div>
        
        <div class="search-box">
            <input type="text" placeholder="搜索帮助文档...">
        </div>
        
        <div class="categories">
            <div class="category-card">
                <div class="category-icon">📖</div>
                <h3>新手指南</h3>
                <p>快速上手，了解心情打卡的基本功能和使用方法</p>
            </div>
            
            <div class="category-card">
                <div class="category-icon">❓</div>
                <h3>常见问题</h3>
                <p>查看其他用户经常问的问题和解决方案</p>
            </div>
            
            <div class="category-card">
                <div class="category-icon">🎯</div>
                <h3>使用教程</h3>
                <p>详细的功能教程，帮助你充分利用每个功能</p>
            </div>
            
            <div class="category-card">
                <div class="category-icon">⚙️</div>
                <h3>账号设置</h3>
                <p>管理你的账号、隐私设置和个人信息</p>
            </div>
            
            <div class="category-card">
                <div class="category-icon">📊</div>
                <h3>数据统计</h3>
                <p>了解如何查看和解读你的心情数据报告</p>
            </div>
            
            <div class="category-card">
                <div class="category-icon">💬</div>
                <h3>联系我们</h3>
                <p>需要帮助？随时联系我们的客服团队</p>
            </div>
        </div>
        
        <div class="quick-links">
            <h2>快速链接</h2>
            <div class="links-grid">
                <a href="user-guide.html" class="link-item">
                    <span>📚</span>
                    <strong>用户指南</strong>
                </a>
                <a href="faq-page.html" class="link-item">
                    <span>❓</span>
                    <strong>常见问题</strong>
                </a>
                <a href="tutorial-page.html" class="link-item">
                    <span>🎓</span>
                    <strong>视频教程</strong>
                </a>
                <a href="#" class="link-item">
                    <span>📱</span>
                    <strong>下载 App</strong>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
