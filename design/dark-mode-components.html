<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深色模式组件 - 心情打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'mood-happy': '#FFD700',
                        'mood-calm': '#90EE90',
                        'mood-sad': '#87CEEB',
                        'mood-angry': '#FF6B6B',
                        'mood-anxious': '#DDA0DD',
                        'mood-tired': '#D3D3D3',
                        'mood-excited': '#FF69B4',
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-white">深色模式组件库</h1>
        
        <!-- 1. 按钮组件 -->
        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">1. 按钮组件</h2>
            <div class="bg-dark-card rounded-lg p-6 border border-dark-border space-y-4">
                <!-- 主按钮 -->
                <div class="flex items-center space-x-4">
                    <button class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors min-w-[120px]">
                        主按钮
                    </button>
                    <button class="px-6 py-3 bg-gray-700 hover:bg-gray-600 text-gray-200 font-medium rounded-lg transition-colors min-w-[120px]">
                        次按钮
                    </button>
                    <button class="px-6 py-3 border border-gray-600 text-gray-300 hover:bg-gray-800 font-medium rounded-lg transition-colors min-w-[120px]">
                        边框按钮
                    </button>
                </div>
                <!-- 带图标按钮 -->
                <div class="flex items-center space-x-4">
                    <button class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        <span>添加</span>
                    </button>
                    <button class="p-3 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- 2. 卡片组件 -->
        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">2. 卡片组件</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 基础卡片 -->
                <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
                    <h3 class="text-lg font-semibold text-white mb-2">卡片标题</h3>
                    <p class="text-gray-400">这是卡片内容，支持多行文本显示。</p>
                </div>
                <!-- 带图片卡片 -->
                <div class="bg-dark-card rounded-lg overflow-hidden border border-dark-border">
                    <div class="h-32 bg-gradient-to-r from-blue-600 to-purple-600"></div>
                    <div class="p-4">
                        <h3 class="text-lg font-semibold text-white mb-2">图片卡片</h3>
                        <p class="text-gray-400">顶部带有图片区域的卡片</p>
                    </div>
                </div>
                <!-- 心情卡片 -->
                <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
                    <div class="flex items-center space-x-4">
                        <div class="w-16 h-16 rounded-full bg-mood-happy flex items-center justify-center text-3xl">
                            😄
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold text-white">开心</h3>
                            <p class="text-gray-400 text-sm">今天心情不错</p>
                        </div>
                    </div>
                </div>
                <!-- 统计卡片 -->
                <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-sm">本月打卡</p>
                            <p class="text-3xl font-bold text-white mt-1">28 天</p>
                        </div>
                        <div class="w-12 h-12 rounded-full bg-blue-600/20 flex items-center justify-center">
                            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 3. 输入框组件 -->
        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">3. 输入框组件</h2>
            <div class="bg-dark-card rounded-lg p-6 border border-dark-border space-y-4">
                <!-- 文本输入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">文本输入</label>
                    <input type="text" placeholder="请输入内容" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <!-- 文本域 -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">文本域</label>
                    <textarea rows="3" placeholder="请输入备注" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                </div>
                <!-- 带图标输入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">搜索框</label>
                    <div class="relative">
                        <input type="text" placeholder="搜索历史记录" class="w-full px-4 py-3 pl-12 bg-gray-800 border border-gray-700 rounded-lg text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <svg class="w-5 h-5 text-gray-500 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </section>

        <!-- 4. 标签组件 -->
        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">4. 标签组件</h2>
            <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 bg-blue-600/20 text-blue-400 text-sm rounded-full">#工作</span>
                    <span class="px-3 py-1 bg-green-600/20 text-green-400 text-sm rounded-full">#生活</span>
                    <span class="px-3 py-1 bg-purple-600/20 text-purple-400 text-sm rounded-full">#健康</span>
                    <span class="px-3 py-1 bg-red-600/20 text-red-400 text-sm rounded-full">#成就</span>
                    <span class="px-3 py-1 bg-yellow-600/20 text-yellow-400 text-sm rounded-full">#旅行</span>
                </div>
            </div>
        </section>

        <!-- 5. 心情选择器 -->
        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">5. 心情选择器</h2>
            <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
                <div class="grid grid-cols-7 gap-2">
                    <button class="aspect-square rounded-full bg-mood-happy hover:scale-110 transition-transform flex items-center justify-center text-2xl shadow-lg">
                        😄
                    </button>
                    <button class="aspect-square rounded-full bg-mood-calm hover:scale-110 transition-transform flex items-center justify-center text-2xl shadow-lg">
                        😊
                    </button>
                    <button class="aspect-square rounded-full bg-mood-sad hover:scale-110 transition-transform flex items-center justify-center text-2xl shadow-lg">
                        😔
                    </button>
                    <button class="aspect-square rounded-full bg-mood-angry hover:scale-110 transition-transform flex items-center justify-center text-2xl shadow-lg">
                        😠
                    </button>
                    <button class="aspect-square rounded-full bg-mood-anxious hover:scale-110 transition-transform flex items-center justify-center text-2xl shadow-lg">
                        😰
                    </button>
                    <button class="aspect-square rounded-full bg-mood-tired hover:scale-110 transition-transform flex items-center justify-center text-2xl shadow-lg">
                        😴
                    </button>
                    <button class="aspect-square rounded-full bg-mood-excited hover:scale-110 transition-transform flex items-center justify-center text-2xl shadow-lg">
                        🤩
                    </button>
                </div>
            </div>
        </section>

        <!-- 6. 导航栏组件 -->
        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">6. 导航栏组件</h2>
            <!-- 顶部导航 -->
            <div class="bg-dark-card rounded-lg border border-dark-border mb-4 overflow-hidden">
                <div class="px-4 py-3 flex items-center justify-between border-b border-dark-border">
                    <button class="text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <h3 class="text-lg font-semibold text-white">页面标题</h3>
                    <button class="text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- 底部导航 -->
            <div class="bg-dark-card rounded-lg border border-dark-border overflow-hidden">
                <div class="flex justify-around py-2">
                    <button class="flex flex-col items-center py-2 px-4 text-blue-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <span class="text-xs mt-1">首页</span>
                    </button>
                    <button class="flex flex-col items-center py-2 px-4 text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span class="text-xs mt-1">历史</span>
                    </button>
                    <button class="flex flex-col items-center py-2 px-4 text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                        <span class="text-xs mt-1">统计</span>
                    </button>
                    <button class="flex flex-col items-center py-2 px-4 text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span class="text-xs mt-1">我的</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- 7. 开关组件 -->
        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">7. 开关组件</h2>
            <div class="bg-dark-card rounded-lg p-6 border border-dark-border space-y-4">
                <div class="flex items-center justify-between">
                    <span class="text-gray-300">深色模式</span>
                    <button class="relative w-12 h-6 bg-blue-600 rounded-full transition-colors">
                        <span class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full transition-transform"></span>
                    </button>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-300">通知提醒</span>
                    <button class="relative w-12 h-6 bg-gray-700 rounded-full transition-colors">
                        <span class="absolute left-1 top-1 w-4 h-4 bg-gray-400 rounded-full transition-transform"></span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
