<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数据统计 - 心情打卡</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-target {
      min-height: 44px;
      min-width: 44px;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50" style="width: 375px; margin: 0 auto; overflow-x: hidden;">
  <!-- 顶部导航 -->
  <nav class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button class="p-2 text-gray-600 touch-target">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h1 class="text-base font-semibold text-gray-800">数据统计</h1>
      </div>
      <div class="w-9"></div>
    </div>
  </nav>

  <!-- 时间范围选择器 -->
  <div class="px-4 py-3">
    <div class="bg-white rounded-xl shadow-sm p-1 flex">
      <button class="flex-1 py-2 text-sm font-medium rounded-lg bg-indigo-500 text-white">7 天</button>
      <button class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50">30 天</button>
      <button class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50">90 天</button>
    </div>
  </div>

  <!-- 概览统计 -->
  <div class="px-4 mb-4">
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-white rounded-xl shadow-sm p-4 text-center">
        <div class="text-2xl font-bold text-indigo-500">5</div>
        <div class="text-xs text-gray-500 mt-1">打卡天数</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 text-center">
        <div class="text-2xl font-bold text-green-500">83%</div>
        <div class="text-xs text-gray-500 mt-1">打卡率</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 text-center">
        <div class="text-2xl font-bold text-purple-500">3</div>
        <div class="text-xs text-gray-500 mt-1">连续打卡</div>
      </div>
    </div>
  </div>

  <!-- 心情分布饼图 -->
  <div class="px-4 mb-4">
    <div class="bg-white rounded-xl shadow-sm p-5">
      <h2 class="text-sm font-semibold text-gray-800 mb-4">心情分布</h2>
      <div class="flex items-center justify-center mb-4">
        <!-- 模拟饼图 -->
        <div class="relative w-40 h-40">
          <svg viewBox="0 0 36 36" class="w-full h-full transform -rotate-90">
            <!-- 开心 40% - 金黄色 -->
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#FFD700" stroke-width="4" stroke-dasharray="40, 100"/>
            <!-- 平静 25% - 浅绿色 -->
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#90EE90" stroke-width="4" stroke-dasharray="25, 100" stroke-dashoffset="-40"/>
            <!-- 兴奋 20% - 粉红色 -->
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#FF69B4" stroke-width="4" stroke-dasharray="20, 100" stroke-dashoffset="-65"/>
            <!-- 低落 10% - 天蓝色 -->
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#87CEEB" stroke-width="4" stroke-dasharray="10, 100" stroke-dashoffset="-85"/>
            <!-- 其他 5% - 灰色 -->
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#D3D3D3" stroke-width="4" stroke-dasharray="5, 100" stroke-dashoffset="-95"/>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="text-center">
              <div class="text-2xl font-bold text-gray-800">5</div>
              <div class="text-xs text-gray-500">次打卡</div>
            </div>
          </div>
        </div>
      </div>
      <!-- 图例 -->
      <div class="space-y-2">
        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[#FFD700]"></div>
            <span class="text-gray-600">开心</span>
          </div>
          <span class="font-medium text-gray-800">40%</span>
        </div>
        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[#90EE90]"></div>
            <span class="text-gray-600">平静</span>
          </div>
          <span class="font-medium text-gray-800">25%</span>
        </div>
        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[#FF69B4]"></div>
            <span class="text-gray-600">兴奋</span>
          </div>
          <span class="font-medium text-gray-800">20%</span>
        </div>
        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[#87CEEB]"></div>
            <span class="text-gray-600">低落</span>
          </div>
          <span class="font-medium text-gray-800">10%</span>
        </div>
        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[#D3D3D3]"></div>
            <span class="text-gray-600">其他</span>
          </div>
          <span class="font-medium text-gray-800">5%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 心情趋势柱状图 -->
  <div class="px-4 mb-4">
    <div class="bg-white rounded-xl shadow-sm p-5">
      <h2 class="text-sm font-semibold text-gray-800 mb-4">心情趋势</h2>
      <div class="flex items-end justify-between h-32 gap-2">
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full bg-gradient-to-t from-indigo-500 to-purple-500 rounded-t h-20"></div>
          <span class="text-xs text-gray-500">一</span>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full bg-gradient-to-t from-indigo-500 to-purple-500 rounded-t h-24"></div>
          <span class="text-xs text-gray-500">二</span>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full bg-gradient-to-t from-indigo-500 to-purple-500 rounded-t h-16"></div>
          <span class="text-xs text-gray-500">三</span>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full bg-gradient-to-t from-indigo-500 to-purple-500 rounded-t h-28"></div>
          <span class="text-xs text-gray-500">四</span>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full bg-gradient-to-t from-indigo-500 to-purple-500 rounded-t h-20"></div>
          <span class="text-xs text-gray-500">五</span>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full bg-gradient-to-t from-indigo-500 to-purple-500 rounded-t h-12"></div>
          <span class="text-xs text-gray-500">六</span>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full bg-gradient-to-t from-indigo-500 to-purple-500 rounded-t h-24"></div>
          <span class="text-xs text-gray-500">日</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 safe-area-bottom" style="max-width: 375px; margin: 0 auto;">
    <div class="flex justify-around items-center h-16">
      <button class="flex flex-col items-center gap-1 p-2 text-gray-500 touch-target">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span class="text-xs">心情日历</span>
      </button>
      <button class="flex flex-col items-center gap-1 p-2 text-indigo-500 touch-target">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="text-xs font-medium">数据统计</span>
      </button>
      <button class="flex flex-col items-center gap-1 p-2 text-gray-500 touch-target">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs">个人中心</span>
      </button>
      <button class="flex flex-col items-center gap-1 p-2 text-gray-500 touch-target">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="text-xs">设置</span>
      </button>
    </div>
  </nav>

  <!-- 底部占位 -->
  <div class="h-20"></div>
</body>
</html>
