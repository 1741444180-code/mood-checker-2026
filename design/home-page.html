<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日打卡 - 心情打卡</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- 顶部导航 -->
  <nav class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🎨</span>
        <span class="text-xl font-semibold text-gray-800">心情打卡</span>
      </div>
      <div class="flex items-center gap-4">
        <button class="p-2 text-gray-600 hover:text-gray-800 relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white font-semibold">
            建
          </div>
          <span class="text-sm font-medium text-gray-700 hidden md:block">建权</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- 欢迎区域 -->
  <div class="bg-gradient-to-br from-indigo-500 to-purple-600 mx-4 mt-6 rounded-2xl p-8 md:p-10">
    <div class="flex items-center gap-3 mb-2">
      <span class="text-3xl">👋</span>
      <h1 class="text-2xl md:text-3xl font-bold text-white">早上好，建权！</h1>
    </div>
    <p class="text-white/85 text-base">今天感觉怎么样？选个心情打卡吧~</p>
  </div>

  <!-- 打卡卡片 -->
  <div class="max-w-3xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8">
      <!-- 日期 -->
      <div class="flex items-center gap-2 mb-6 pb-4 border-b border-gray-100">
        <span class="text-indigo-500">📍</span>
        <span class="text-gray-700 font-medium">2026 年 3 月 28 日 星期六</span>
      </div>

      <!-- 心情选择 -->
      <div class="mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">选择你今天的心情：</h2>
        <div class="grid grid-cols-4 md:grid-cols-4 gap-4">
          <!-- 开心 -->
          <button class="relative p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all duration-300" style="aspect-ratio: 1;">
            <div class="text-4xl mb-2">😄</div>
            <div class="text-sm font-medium text-gray-600">开心</div>
          </button>
          <!-- 平静 -->
          <button class="relative p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all duration-300" style="aspect-ratio: 1;">
            <div class="text-4xl mb-2">😊</div>
            <div class="text-sm font-medium text-gray-600">平静</div>
          </button>
          <!-- 低落 -->
          <button class="relative p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all duration-300" style="aspect-ratio: 1;">
            <div class="text-4xl mb-2">😔</div>
            <div class="text-sm font-medium text-gray-600">低落</div>
          </button>
          <!-- 生气 -->
          <button class="relative p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all duration-300" style="aspect-ratio: 1;">
            <div class="text-4xl mb-2">😠</div>
            <div class="text-sm font-medium text-gray-600">生气</div>
          </button>
          <!-- 焦虑 -->
          <button class="relative p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all duration-300" style="aspect-ratio: 1;">
            <div class="text-4xl mb-2">😰</div>
            <div class="text-sm font-medium text-gray-600">焦虑</div>
          </button>
          <!-- 疲惫 -->
          <button class="relative p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all duration-300" style="aspect-ratio: 1;">
            <div class="text-4xl mb-2">😴</div>
            <div class="text-sm font-medium text-gray-600">疲惫</div>
          </button>
          <!-- 兴奋 -->
          <button class="relative p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all duration-300" style="aspect-ratio: 1;">
            <div class="text-4xl mb-2">🤩</div>
            <div class="text-sm font-medium text-gray-600">兴奋</div>
          </button>
        </div>
      </div>

      <!-- 备注输入 -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          今天发生了什么？（可选）
        </label>
        <textarea
          placeholder="记录一下今天的心情故事..."
          class="w-full min-h-[80px] p-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none resize-none"
          maxLength="500"
        ></textarea>
        <div class="text-right text-xs text-gray-400 mt-1">
          0/500
        </div>
      </div>

      <!-- 标签选择 -->
      <div class="mb-8">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          添加标签（可选）：
        </label>
        <div class="flex flex-wrap gap-2">
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">
            工作
          </button>
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">
            生活
          </button>
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">
            健康
          </button>
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">
            学习
          </button>
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">
            家庭
          </button>
        </div>
      </div>

      <!-- 提交按钮 -->
      <button
        class="w-full h-14 bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-lg font-semibold rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300"
      >
        提交打卡
      </button>
    </div>

    <!-- 快捷导航 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
      <a href="#" class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-1 transition-all text-center">
        <div class="w-10 h-10 mx-auto mb-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white text-xl">
          📅
        </div>
        <span class="text-sm font-medium text-gray-700">心情日历</span>
      </a>
      <a href="#" class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-1 transition-all text-center">
        <div class="w-10 h-10 mx-auto mb-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white text-xl">
          📊
        </div>
        <span class="text-sm font-medium text-gray-700">数据统计</span>
      </a>
      <a href="#" class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-1 transition-all text-center">
        <div class="w-10 h-10 mx-auto mb-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white text-xl">
          👤
        </div>
        <span class="text-sm font-medium text-gray-700">个人中心</span>
      </a>
      <a href="#" class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-1 transition-all text-center">
        <div class="w-10 h-10 mx-auto mb-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white text-xl">
          ⚙️
        </div>
        <span class="text-sm font-medium text-gray-700">设置</span>
      </a>
    </div>
  </div>
</body>
</html>
