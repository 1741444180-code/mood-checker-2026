<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好友列表 - PC 端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            height: 80vh;
        }

        /* 左侧好友列表 */
        .friend-list-panel {
            width: 380px;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid #e8e8e8;
            background: #ffffff;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .add-friend-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .add-friend-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            background: #f5f5f5;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }

        .request-tab {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(135deg, #f0f4ff, #e8eeff);
            border-bottom: 1px solid #e8e8e8;
            cursor: pointer;
            transition: all 0.3s;
        }

        .request-tab:hover {
            background: linear-gradient(135deg, #e0e8ff, #d0dfff);
        }

        .request-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .request-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .request-text {
            font-size: 14px;
            color: #333;
        }

        .request-count {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .filter-tabs {
            display: flex;
            padding: 12px 24px;
            gap: 8px;
            border-bottom: 1px solid #e8e8e8;
            background: #ffffff;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tab:hover {
            background: #f5f5f5;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 500;
        }

        .friend-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .friend-group {
            margin-bottom: 20px;
        }

        .group-title {
            font-size: 13px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 6px;
            background: #ffffff;
            border: 1px solid transparent;
        }

        .friend-item:hover {
            background: #f0f4ff;
            border-color: #667eea;
            transform: translateX(4px);
        }

        .friend-item.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .friend-item.selected .friend-name,
        .friend-item.selected .friend-status {
            color: white;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: #43e97b;
            border: 2px solid #ffffff;
            border-radius: 50%;
        }

        .offline-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: #ccc;
            border: 2px solid #ffffff;
            border-radius: 50%;
        }

        .friend-info {
            flex: 1;
            min-width: 0;
        }

        .friend-name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .friend-status {
            font-size: 13px;
            color: #999;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friend-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .friend-item:hover .friend-actions {
            opacity: 1;
        }

        .friend-action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: #f5f5f5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s;
        }

        .friend-action-btn:hover {
            background: #667eea;
            color: white;
        }

        /* 右侧好友详情/操作区 */
        .friend-detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .detail-header {
            padding: 32px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .detail-avatar {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 32px;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .detail-info h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .detail-info p {
            font-size: 14px;
            color: #999;
            margin-bottom: 4px;
        }

        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #f0fff4;
            color: #43e97b;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
        }

        .detail-actions {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .action-btn.secondary {
            background: #f5f5f5;
            color: #666;
        }

        .action-btn.secondary:hover {
            background: #e8e8e8;
        }

        .detail-content {
            flex: 1;
            padding: 32px;
            background: #fafafa;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .info-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .info-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }

        /* 好友请求弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 18px;
        }

        .modal-body {
            padding: 24px;
        }

        .request-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #fafafa;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .request-avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 22px;
        }

        .request-details {
            flex: 1;
        }

        .request-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .request-message {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .request-time {
            font-size: 12px;
            color: #999;
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .request-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .request-btn.accept {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white;
        }

        .request-btn.accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 233, 123, 0.4);
        }

        .request-btn.decline {
            background: #f5f5f5;
            color: #666;
        }

        .request-btn.decline:hover {
            background: #e8e8e8;
        }

        /* 添加好友表单 */
        .add-friend-form {
            display: none;
        }

        .add-friend-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧好友列表 -->
        <div class="friend-list-panel">
            <div class="panel-header">
                <div class="panel-title">
                    👥 好友
                    <button class="add-friend-btn" onclick="toggleAddFriend()">+</button>
                </div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="搜索好友...">
                </div>
            </div>

            <div class="request-tab" onclick="toggleRequestModal()">
                <div class="request-info">
                    <div class="request-icon">💌</div>
                    <span class="request-text">好友请求</span>
                </div>
                <span class="request-count">3</span>
            </div>

            <div class="filter-tabs">
                <div class="filter-tab active">全部</div>
                <div class="filter-tab">在线</div>
                <div class="filter-tab">最近联系</div>
            </div>

            <div class="friend-list">
                <div class="friend-group">
                    <div class="group-title">在线 (3)</div>
                    <div class="friend-item selected">
                        <div class="avatar">
                            大
                            <span class="online-indicator"></span>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">大伟</div>
                            <div class="friend-status">项目经理</div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-action-btn">💬</button>
                            <button class="friend-action-btn">📞</button>
                        </div>
                    </div>

                    <div class="friend-item">
                        <div class="avatar" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                            建
                            <span class="online-indicator"></span>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">建权</div>
                            <div class="friend-status">老板 · 在线</div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-action-btn">💬</button>
                            <button class="friend-action-btn">📞</button>
                        </div>
                    </div>

                    <div class="friend-item">
                        <div class="avatar" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
                            黄
                            <span class="online-indicator"></span>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">黄金九</div>
                            <div class="friend-status">总管</div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-action-btn">💬</button>
                            <button class="friend-action-btn">📞</button>
                        </div>
                    </div>
                </div>

                <div class="friend-group">
                    <div class="group-title">离线 (5)</div>
                    <div class="friend-item">
                        <div class="avatar" style="background: linear-gradient(135deg, #fa709a, #fee140);">
                            小
                            <span class="offline-indicator"></span>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">小明</div>
                            <div class="friend-status">2 小时前在线</div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-action-btn">💬</button>
                            <button class="friend-action-btn">📞</button>
                        </div>
                    </div>

                    <div class="friend-item">
                        <div class="avatar" style="background: linear-gradient(135deg, #a8edea, #fed6e3);">
                            小
                            <span class="offline-indicator"></span>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">小红</div>
                            <div class="friend-status">昨天</div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-action-btn">💬</button>
                            <button class="friend-action-btn">📞</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧好友详情 -->
        <div class="friend-detail-panel">
            <div class="detail-header">
                <div class="detail-avatar">大</div>
                <div class="detail-info">
                    <h2>大伟</h2>
                    <p>项目经理</p>
                    <p>ID: 10086</p>
                    <div class="online-badge">🟢 在线</div>
                </div>
                <div class="detail-actions">
                    <button class="action-btn primary">💬 发消息</button>
                    <button class="action-btn secondary">📞 语音</button>
                </div>
            </div>

            <div class="detail-content">
                <h3 class="section-title">详细信息</h3>
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">昵称</div>
                        <div class="info-value">大伟</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">ID</div>
                        <div class="info-value">10086</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">职位</div>
                        <div class="info-value">项目经理</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">添加时间</div>
                        <div class="info-value">2024-01-15</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">备注</div>
                        <div class="info-value">我的上级</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">共同好友</div>
                        <div class="info-value">12 人</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 好友请求弹窗 -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal">
            <div class="modal-header">
                <h3>💌 好友请求</h3>
                <button class="close-btn" onclick="toggleRequestModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="request-item">
                    <div class="request-avatar">李</div>
                    <div class="request-details">
                        <div class="request-name">李明</div>
                        <div class="request-message">想添加你为好友，一起合作鱼虾蟹项目</div>
                        <div class="request-time">10 分钟前</div>
                    </div>
                    <div class="request-actions">
                        <button class="request-btn accept">接受</button>
                        <button class="request-btn decline">拒绝</button>
                    </div>
                </div>

                <div class="request-item">
                    <div class="request-avatar" style="background: linear-gradient(135deg, #667eea, #764ba2);">王</div>
                    <div class="request-details">
                        <div class="request-name">王芳</div>
                        <div class="request-message">你好，我是 UI 设计师，想和你交流</div>
                        <div class="request-time">1 小时前</div>
                    </div>
                    <div class="request-actions">
                        <button class="request-btn accept">接受</button>
                        <button class="request-btn decline">拒绝</button>
                    </div>
                </div>

                <div class="request-item">
                    <div class="request-avatar" style="background: linear-gradient(135deg, #f093fb, #f5576c);">张</div>
                    <div class="request-details">
                        <div class="request-name">张伟</div>
                        <div class="request-message">通过群聊添加</div>
                        <div class="request-time">昨天</div>
                    </div>
                    <div class="request-actions">
                        <button class="request-btn accept">接受</button>
                        <button class="request-btn decline">拒绝</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加好友弹窗 -->
    <div class="modal-overlay" id="addFriendModal">
        <div class="modal">
            <div class="modal-header">
                <h3>➕ 添加好友</h3>
                <button class="close-btn" onclick="toggleAddFriend()">×</button>
            </div>
            <div class="modal-body">
                <div class="add-friend-form active" id="searchForm">
                    <div class="form-group">
                        <label class="form-label">搜索用户</label>
                        <input type="text" class="form-input" placeholder="输入用户名、ID 或手机号">
                    </div>
                    <button class="action-btn primary" style="width: 100%;">🔍 搜索</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleRequestModal() {
            document.getElementById('requestModal').classList.toggle('active');
        }

        function toggleAddFriend() {
            document.getElementById('addFriendModal').classList.toggle('active');
        }

        // 点击遮罩关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
